<template>
    <lightning-card title="Wrapper Class Demo in LWC" icon-name="custom:custom63">
        <template if:true={wrapperList.data}>
            <lightning-accordion class="example-accordion">
                <template for:each={wrapperList.data} for:item="wrap">
                    <lightning-accordion-section key={wrap.Id} name={wrap.accRecord.Id} label={wrap.accRecord.Name}>
                        <template for:each={wrap.contactList} for:item="contact">
                            <p key={contact.Id}>{contact.FirstName} {contact.LastName}</p>
                        </template>
                    </lightning-accordion-section>
                </template>
            </lightning-accordion>
        </template>
    </lightning-card>
</template>
