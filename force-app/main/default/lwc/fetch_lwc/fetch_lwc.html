<template>

    <lightning-accordion allow-multiple-sections>
        <lightning-accordion-section label="The fetch API Demo" name="section1">
                    <div class="slds-m-around_medium ">
                    <h2>The fetch API Demo in LWC </h2>
                    <div class="slds-grid slds-gutters slds-wrap">
                        <template for:each={characters} for:item="character">
                            <div class="slds-col slds-size_1-of-3" key={character.id}>

                                <div class="card slds-m-around_medium">
                                    <div class="card-header">
                                        <h2>{character.name}</h2>
                                    </div>
                                    <div class="card-image">
                                        <img src={character.image} alt="Card Image" />
                                    </div>
                                    <div class="card-subtext">
                                        <div class="column">
                                            <span>{character.race}</span>
                                        </div>
                                        <div class="column">
                                            <span>{character.affiliation}</span>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </template>
                    </div>
                </div>
        </lightning-accordion-section>
    </lightning-accordion>
</template>
