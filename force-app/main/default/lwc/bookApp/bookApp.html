<template>
    <lightning-card>
        <div class="slds-p-around_medium">
            <lightning-layout multiple-rows>
                <template if:true={books}>
                    <template for:each={books.items} for:item="book">
                            <lightning-layout-item size="3" padding="around-small" key={book.id}>
                                <div class="slds-box slds-p-around_medium">
                                    <img src={book.volumeInfo.imageLinks.smallThumbnail} height="200px" >
                                    <div class="slds-text-heading_small"><strong>{book.volumeInfo.title}</strong></div>
                                    <div class="slds-text-heading_small"><strong>Published Date - {book.volumeInfo.publishedDate}</strong></div>
                                    <div class="slds-text-heading_small"><strong>Average Rating - {book.volumeInfo.averageRating}</strong></div>
                                </div>
                            </lightning-layout-item>
                    </template>
                </template>
            </lightning-layout>
        </div>
    </lightning-card>
</template>
