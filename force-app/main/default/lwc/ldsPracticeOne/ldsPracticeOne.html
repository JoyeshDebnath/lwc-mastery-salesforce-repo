<template>
    <lightning-card title="LDS Demo 1" >
            <lightning-record-form
                record-id={recordId}
                object-api-name="Contact"
                fields={fields}
            ></lightning-record-form>
    </lightning-card>
    <lightning-card title="LDS demo 2 ">
        <lightning-record-view-form
            record-id={recordId}
            object-api-name="Contact"
        >
         <div class="slds-grid">
                <div class="slds-size_1-of-2">
                    <h2 >{emailValue}</h2>
                </div>
                <div class="slds-size_1-of-2">
                    <h2>{nameValue}</h2>
                </div>
            </div>
            <div class="slds-size_1-of-2">
                    <lightning-formatted-email value={ownerNameValue}></lightning-formatted-email>
            </div>
                
            
    </lightning-record-view-form>
    </lightning-card>
</template>
