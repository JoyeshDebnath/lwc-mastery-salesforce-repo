<template>
    <c-toast-cmp></c-toast-cmp>
    <div class="app">
        <div class="box box-center" onclick={createNoteModalHandler}>
            <div class="dotted-circle">
                <lightning-icon class="custom-icon" icon-name='utility:add' alternative-text='add' size='large'
                    title='add'></lightning-icon>
            </div>
            <h2>Add new Note</h2>
        </div>
        <template for:each={allNotes} for:item="note">
                <div key={note.Id} class="box slds-var-m-bottom_medium">
                    <header>
                        <h2 class="slds-truncate">{note.Name}</h2>
                    </header>
                    <div class="notes">
                        <c-append-html result={note.Note_Description__c}></c-append-html>
                       
                    </div>
                    <footer class="footer">
                        <div>{note.formattedDate}</div>
                        <div>
                            <lightning-icon onclick={onEditNote} data-recordid={note.Id} class="edit-icon " icon-name='action:edit' alternative-text='edit' size='small'
                                title='edit'></lightning-icon>
                            <lightning-icon onclick={onDeleteNote} data-recordid={note.Id} class="delete-icon" icon-name='action:delete' alternative-text='delete' size='small'
                                title='delete'></lightning-icon>
                        </div>
                    </footer>
        </div>
        </template>
    </div>
    <!-- create note  form below 👇 -->
    <template if:true={showModal}>
        <c-modal>
            <h1 slot="header" class="slds-modal__title">{actionHeaderName}</h1>
            <div>
                <form action="">
                    <lightning-input type="text" value={noteRecord.Name} label="Note Title" name="Name"
                        class="slds-m-bottom_medium" onchange={changeHandler}></lightning-input>
                    <lightning-input-rich-text name="Note_Description__c" value={noteRecord.Note_Description__c}
                        label-visible label="Note Description" formats={formats} onchange={changeHandler}></lightning-input-rich-text>
                </form>
            </div>
            <footer slot="footer">
                <button class="slds-button slds-button_neutral" onclick={closeModalHandler}>Cancel</button>
                <button class="slds-button slds-button_brand" onclick={formSubmitHandler}
                 disabled={isFormInvalid}>Save</button>
            </footer>
        </c-modal>
    </template>
</template>
